<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #222;
    --text-primary: #e8e8e8;
    --text-secondary: #777;
    --text-tertiary: #555;
    --accent: #fff;
    --online: #34d399;
    --busy: #f59e0b;
    --idle: #6b7280;
    --offline: #374151;
    --blocked: #ef4444;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  .header-left .meta {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--online);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font);
  }

  .refresh-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }
  .refresh-btn .icon { transition: transform 0.4s ease; }
  .refresh-btn.loading .icon { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Agent Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: background 0.2s ease;
  }

  .card:hover { background: var(--surface-hover); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .agent-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--offline);
    color: var(--text-primary);
  }

  .status-badge.online { background: rgba(52,211,153,0.15); color: var(--online); }
  .status-badge.busy { background: rgba(245,158,11,0.15); color: var(--busy); animation: breathe 2s ease-in-out infinite; }
  .status-badge.idle { background: rgba(107,114,128,0.15); color: var(--idle); }
  .status-badge.offline { background: rgba(55,65,81,0.3); color: var(--text-tertiary); }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .task-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    min-height: 18px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--text-secondary);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .progress-pct {
    font-size: 11px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .completed-count {
    background: rgba(52,211,153,0.1);
    color: var(--online);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
  }

  /* Timeline Section */
  .timeline-section {
    margin-top: 48px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
  }

  .timeline {
    position: relative;
    padding-left: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: var(--border);
  }

  .timeline-item {
    position: relative;
    padding: 0 0 20px 20px;
    font-size: 13px;
  }

  .timeline-item:last-child { padding-bottom: 0; }

  .timeline-dot {
    position: absolute;
    left: -17px;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--bg);
  }

  .timeline-dot.started { background: var(--online); }
  .timeline-dot.completed { background: var(--online); }
  .timeline-dot.updated { background: var(--busy); }
  .timeline-dot.blocked { background: var(--blocked); }
  .timeline-dot.note { background: var(--idle); }

  .timeline-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .timeline-time {
    font-size: 11px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  .timeline-agent {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .timeline-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .timeline-type.started { background: rgba(52,211,153,0.15); color: var(--online); }
  .timeline-type.completed { background: rgba(52,211,153,0.15); color: var(--online); }
  .timeline-type.updated { background: rgba(245,158,11,0.12); color: var(--busy); }
  .timeline-type.blocked { background: rgba(239,68,68,0.15); color: var(--blocked); }
  .timeline-type.note { background: rgba(107,114,128,0.15); color: var(--idle); }

  .timeline-summary {
    color: var(--text-primary);
  }

  .empty {
    color: var(--text-tertiary);
    font-size: 13px;
    text-align: center;
    padding: 48px 0;
  }

  @media (max-width: 640px) {
    .container { padding: 32px 16px; }
    .grid { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
  }

  /* Edit Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 380px;
    max-width: 90vw;
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--text-tertiary);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn {
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s;
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-secondary);
  }

  .btn-secondary:hover { background: var(--surface-hover); }

  .btn-primary {
    background: var(--text-primary);
    color: var(--bg);
    border-color: var(--text-primary);
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-primary);
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s ease;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  .card { cursor: pointer; }

</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Mission Control</h1>
      <div class="meta">
        <span class="pulse"></span>
        <span id="refresh-status">Loading…</span>
      </div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
      <span class="icon">↻</span> Refresh
    </button>
  </header>

  <div class="grid" id="agent-grid"></div>

  <div class="timeline-section">
    <div class="section-header">
      <h2>Activity Timeline</h2>
    </div>
    <div class="timeline" id="timeline">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

<script>
const DATA_BASE = 'data/';
const REFRESH_INTERVAL = 30000;
let activitiesData = [];

function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function countCompleted(agentId) {
  const today = new Date().toISOString().slice(0, 10);
  return activitiesData.filter(e =>
    e.agent_id === agentId && e.type === 'completed' && e.ts.startsWith(today)
  ).length;
}

function renderAgents(agents) {
  const grid = document.getElementById('agent-grid');
  grid.innerHTML = agents.map(a => {
    const done = countCompleted(a.id);
    const doneTag = done > 0
      ? `<span class="completed-count">${done} done today</span>`
      : '';
    return `
    <div class="card" onclick="openModal('${a.id}')">
      <div class="card-header">
        <span class="agent-name">${a.name}</span>
        <span class="status-badge ${a.status}">${a.status}</span>
      </div>
      <div class="task-label">${a.current_task || 'No active task'}</div>
      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${a.progress}%"></div>
        </div>
        <span class="progress-pct">${a.progress}%</span>
      </div>
      <div class="card-footer">
        <span>${relativeTime(a.updated_at)}</span>
        ${doneTag}
      </div>
    </div>`;
  }).join('');
}

function renderTimeline(events) {
  const el = document.getElementById('timeline');
  const recent = events.slice(-20).reverse();
  if (!recent.length) {
    el.innerHTML = '<div class="empty">No activity yet</div>';
    return;
  }
  el.innerHTML = recent.map(e => `
    <div class="timeline-item">
      <div class="timeline-dot ${e.type}"></div>
      <div class="timeline-meta">
        <span class="timeline-time">${formatTime(e.ts)}</span>
        <span class="timeline-agent">${e.agent_id}</span>
        <span class="timeline-type ${e.type}">${e.type}</span>
      </div>
      <div class="timeline-summary">${e.summary}</div>
    </div>
  `).join('');
}

async function fetchJSON(path) {
  const res = await fetch(path + '?t=' + Date.now());
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function refresh() {
  try {
    const [tasks, activities] = await Promise.all([
      fetchJSON(DATA_BASE + 'tasks.json'),
      fetchJSON(DATA_BASE + 'activities.json')
    ]);
    activitiesData = activities.events || [];
    currentTasks = tasks;
    renderAgents(tasks.agents || []);
    renderTimeline(activitiesData);
    document.getElementById('refresh-status').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('refresh-status').textContent = 'Using sample data';
    activitiesData = sampleEvents;
    renderAgents(sampleAgents);
    renderTimeline(sampleEvents);
  }
}

function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  refresh().finally(() => {
    setTimeout(() => btn.classList.remove('loading'), 400);
  });
}

const sampleAgents = [
  { id: 'lisa', name: 'Lisa', status: 'online', current_task: 'QA + 進度追蹤', progress: 40, updated_at: new Date().toISOString() },
  { id: 'jony', name: 'Jony', status: 'busy', current_task: 'Dashboard Phase 2', progress: 30, updated_at: new Date().toISOString() },
  { id: 'jarvis', name: 'Jarvis', status: 'busy', current_task: 'Repo + Schema 建置', progress: 90, updated_at: new Date().toISOString() },
  { id: 'naomi', name: 'Naomi', status: 'online', current_task: '需求規格撰寫', progress: 100, updated_at: new Date().toISOString() },
  { id: 'jennie', name: 'Jennie', status: 'online', current_task: 'Daily Briefing + 生活管理', progress: 50, updated_at: new Date().toISOString() }
];

const sampleEvents = [
  { ts: new Date(Date.now() - 60000).toISOString(), agent_id: 'jony', type: 'started', summary: 'Dashboard Phase 2 — Timeline + Stats' },
  { ts: new Date(Date.now() - 120000).toISOString(), agent_id: 'jarvis', type: 'completed', summary: 'Schema + README pushed to repo' },
  { ts: new Date(Date.now() - 180000).toISOString(), agent_id: 'naomi', type: 'completed', summary: '需求規格 v1 + P1 清單' },
  { ts: new Date(Date.now() - 240000).toISOString(), agent_id: 'jony', type: 'completed', summary: 'MVP Dashboard UI — QA approved' },
  { ts: new Date(Date.now() - 300000).toISOString(), agent_id: 'lisa', type: 'started', summary: 'Project kickoff — Mission Control' },
  { ts: new Date(Date.now() - 360000).toISOString(), agent_id: 'jennie', type: 'updated', summary: 'Daily briefing 進行中' }
];

refresh();
setInterval(refresh, REFRESH_INTERVAL);
</script>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Edit Agent</h3>
    <div class="field">
      <label>Status</label>
      <select id="edit-status">
        <option value="online">Online</option>
        <option value="busy">Busy</option>
        <option value="idle">Idle</option>
        <option value="offline">Offline</option>
      </select>
    </div>
    <div class="field">
      <label>Current Task</label>
      <input type="text" id="edit-task" placeholder="What are they working on?">
    </div>
    <div class="field">
      <label>Progress</label>
      <input type="range" id="edit-progress" min="0" max="100" step="5" oninput="document.getElementById('progress-val').textContent=this.value+'%'">
      <span id="progress-val" style="font-size:11px;color:var(--text-tertiary)">0%</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveAgent()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const REPO = 'codenameagentd-cloud/mission-control-dashboard';
const BRANCH = 'main';
let editingAgent = null;
let currentTasks = null;

function openModal(agentId) {
  const agent = (currentTasks || {agents:[]}).agents.find(a => a.id === agentId);
  if (!agent) return;
  editingAgent = agentId;
  document.getElementById('modal-title').textContent = agent.name;
  document.getElementById('edit-status').value = agent.status;
  document.getElementById('edit-task').value = agent.current_task || '';
  document.getElementById('edit-progress').value = agent.progress;
  document.getElementById('progress-val').textContent = agent.progress + '%';
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  editingAgent = null;
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 3000);
}

async function saveAgent() {
  if (!editingAgent || !currentTasks) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const agent = currentTasks.agents.find(a => a.id === editingAgent);
    agent.status = document.getElementById('edit-status').value;
    agent.current_task = document.getElementById('edit-task').value;
    agent.progress = parseInt(document.getElementById('edit-progress').value);
    agent.updated_at = new Date().toISOString();
    currentTasks.generated_at = new Date().toISOString();

    // Get current file SHA
    const metaRes = await fetch(`https://api.github.com/repos/${REPO}/contents/data/tasks.json?ref=${BRANCH}`, {
      headers: ghHeaders()
    });
    if (!metaRes.ok) throw new Error('Failed to read file');
    const meta = await metaRes.json();

    // Update file
    const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/data/tasks.json`, {
      method: 'PUT',
      headers: ghHeaders(),
      body: JSON.stringify({
        message: `Update ${agent.name}: ${agent.status} — ${agent.current_task || 'idle'}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentTasks, null, 2)))),
        sha: meta.sha,
        branch: BRANCH
      })
    });

    if (!updateRes.ok) throw new Error('Failed to save');
    showToast('Saved — refreshing…');
    closeModal();
    setTimeout(refresh, 2000);
  } catch (e) {
    showToast('Error: ' + e.message, 5000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

function ghHeaders() {
  const token = localStorage.getItem('gh_token');
  const h = { 'Accept': 'application/vnd.github.v3+json' };
  if (token) h['Authorization'] = 'token ' + token;
  return h;
}

// Token setup UI
if (!localStorage.getItem('gh_token')) {
  const notice = document.createElement('div');
  notice.style.cssText = 'position:fixed;top:12px;right:12px;z-index:50;';
  notice.innerHTML = '<button class="btn btn-secondary" onclick="promptToken()" style="font-size:11px">🔑 Set GitHub Token</button>';
  document.body.appendChild(notice);
}

function promptToken() {
  const t = prompt('GitHub Personal Access Token (repo scope):');
  if (t) { localStorage.setItem('gh_token', t.trim()); location.reload(); }
}
</script>

</body>
</html>
